<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny People App</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Funny People App</h1>
        <p>Click on a photo to see it larger and have a laugh.</p>
    </header>

    <main class="gallery">
        <div class="card">
            <img src="imgs/IMG_2636.JPG" alt="Hilarious Moment #1" data-caption="Hilarious Moment #1">
            <p>Hilarious Moment #1</p>
        </div>
        <div class="card">
            <img src="imgs/IMG_2637.JPG" alt="Epic Fail #2" data-caption="Epic Fail #2">
            <p>Epic Fail #2</p>
        </div>
        <div class="card">
            <img src="imgs/IMG_2638.JPG" alt="Silly Situation #3" data-caption="Silly Situation #3">
            <p>Silly Situation #3</p>
        </div>
        <div class="card">
            <img src="imgs/IMG_2639.JPG" alt="Goofy Expression #4" data-caption="Goofy Expression #4">
            <p>Goofy Expression #4</p>
        </div>
        <div class="card">
            <img src="imgs/IMG_2640.JPG" alt="Crazy Pose #5" data-caption="Crazy Pose #5">
            <p>Crazy Pose #5</p>
        </div>
        <div class="card">
            <img src="imgs/IMG_2641.JPG" alt="Funny Face #6" data-caption="Funny Face #6">
            <p>Funny Face #6</p>
        </div>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal" class="modal-close" type="button">&times;</button>
            <img id="modal-image" class="modal-image" src="" alt="">
            <p id="modal-caption" class="modal-caption"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
